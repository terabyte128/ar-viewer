<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>STL AR Viewer</title>

    <!-- Model Viewer -->
    <script
      type="module"
      src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"
    ></script>

    <!-- Three.js for STL loading and GLB conversion -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px 20px;
        text-align: center;
      }

      .header h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      .header p {
        font-size: 14px;
        opacity: 0.9;
      }

      .upload-section {
        padding: 30px 20px;
        text-align: center;
      }

      .upload-button {
        position: relative;
        display: inline-block;
      }

      .upload-button input[type="file"] {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }

      .upload-button label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 16px 32px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-radius: 50px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }

      .upload-button label:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
      }

      .upload-button label:active {
        transform: translateY(0);
      }

      #status {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        font-size: 14px;
        min-height: 20px;
      }

      #status.loading {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffc107;
      }

      #status.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #28a745;
      }

      #status.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #dc3545;
      }

      .viewer-section {
        padding: 20px;
        display: none;
      }

      .viewer-section.visible {
        display: block;
      }

      model-viewer {
        width: 100%;
        height: 500px;
        background-color: #f5f5f5;
        border-radius: 15px;
        --progress-bar-color: #667eea;
      }

      .controls {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .controls button {
        padding: 12px 24px;
        border: none;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-secondary {
        background: #f5f5f5;
        color: #333;
      }

      .btn-secondary:hover {
        background: #e0e0e0;
      }

      .info-box {
        margin-top: 20px;
        padding: 15px;
        background: #e3f2fd;
        border-radius: 10px;
        font-size: 13px;
        color: #0d47a1;
        line-height: 1.6;
      }

      .info-box strong {
        display: block;
        margin-bottom: 5px;
      }

      .rotation-controls {
        margin-top: 20px;
        padding: 20px;
        background: #f9f9f9;
        border-radius: 15px;
      }

      .rotation-controls h3 {
        margin: 0 0 15px 0;
        font-size: 16px;
        color: #333;
        text-align: center;
      }

      .rotation-group {
        margin-bottom: 15px;
      }

      .rotation-group label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        color: #555;
        font-weight: 600;
      }

      .rotation-row {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .rotation-row input[type="range"] {
        flex: 1;
        height: 6px;
        border-radius: 3px;
        background: #ddd;
        outline: none;
        -webkit-appearance: none;
      }

      .rotation-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        cursor: pointer;
      }

      .rotation-row input[type="range"]::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        cursor: pointer;
        border: none;
      }

      .rotation-row span {
        min-width: 50px;
        text-align: right;
        font-size: 13px;
        color: #666;
        font-family: 'Monaco', 'Courier New', monospace;
      }

      .rotation-buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 15px;
      }

      .rotation-buttons button {
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #e0e0e0;
        color: #333;
        transition: all 0.2s;
      }

      .rotation-buttons button:hover {
        background: #d0d0d0;
      }

      .rotation-buttons button:active {
        transform: scale(0.95);
      }

      @media (max-width: 600px) {
        .header h1 {
          font-size: 24px;
        }

        model-viewer {
          height: 400px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>STL AR Viewer</h1>
        <p>Upload an STL file to view it in Augmented Reality</p>
      </div>

      <div class="upload-section">
        <div class="upload-button">
          <label for="stlFile">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            Choose STL File
          </label>
          <input type="file" id="stlFile" accept=".stl" />
        </div>
        <div id="status"></div>

        <div class="info-box">
          <strong>How to use:</strong>
          1. Tap "Choose STL File" and select your STL file<br />
          2. Wait for the model to load<br />
          3. Tap "View in AR" to see it in your space<br />
          4. On iOS, point your camera at a flat surface
        </div>
      </div>

      <div class="viewer-section" id="viewerSection">
        <model-viewer
          id="modelViewer"
          ar
          ar-modes="webxr scene-viewer quick-look"
          camera-controls
          touch-action="pan-y"
          shadow-intensity="1"
          exposure="1"
          auto-rotate
          xr-environment
        >
          <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
          </div>
        </model-viewer>

        <div class="rotation-controls">
          <h3>Adjust Rotation</h3>
          
          <div class="rotation-group">
            <label>X Axis (Pitch)</label>
            <div class="rotation-row">
              <input type="range" id="rotationX" min="-180" max="180" value="0" step="1">
              <span id="rotationXValue">0°</span>
            </div>
          </div>

          <div class="rotation-group">
            <label>Y Axis (Yaw)</label>
            <div class="rotation-row">
              <input type="range" id="rotationY" min="-180" max="180" value="0" step="1">
              <span id="rotationYValue">0°</span>
            </div>
          </div>

          <div class="rotation-group">
            <label>Z Axis (Roll)</label>
            <div class="rotation-row">
              <input type="range" id="rotationZ" min="-180" max="180" value="0" step="1">
              <span id="rotationZValue">0°</span>
            </div>
          </div>

          <div class="rotation-buttons">
            <button id="rotate90X">Rotate X +90°</button>
            <button id="rotate90Y">Rotate Y +90°</button>
            <button id="rotate90Z">Rotate Z +90°</button>
            <button id="rotateNeg90X">Rotate X -90°</button>
            <button id="rotateNeg90Y">Rotate Y -90°</button>
            <button id="rotateNeg90Z">Rotate Z -90°</button>
          </div>
        </div>

        <div class="controls">
          <button class="btn-primary" id="arButton">View in AR</button>
          <button class="btn-secondary" id="resetButton">Reset View</button>
          <button class="btn-secondary" id="uploadNew">Upload New File</button>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { STLLoader } from "three/addons/loaders/STLLoader.js";
      import { GLTFExporter } from "three/addons/exporters/GLTFExporter.js";
      import { USDZExporter } from "three/addons/exporters/USDZExporter.js";

      let currentModelUrl = null;
      let currentUSDZUrl = null;
      let currentMesh = null;
      let baseGeometry = null; // Store original geometry
      let currentRotation = { x: 0, y: 0, z: 0 };

      const fileInput = document.getElementById("stlFile");
      const status = document.getElementById("status");
      const viewerSection = document.getElementById("viewerSection");
      const modelViewer = document.getElementById("modelViewer");
      const arButton = document.getElementById("arButton");
      const resetButton = document.getElementById("resetButton");
      const uploadNewButton = document.getElementById("uploadNew");

      // Rotation controls
      const rotationX = document.getElementById("rotationX");
      const rotationY = document.getElementById("rotationY");
      const rotationZ = document.getElementById("rotationZ");
      const rotationXValue = document.getElementById("rotationXValue");
      const rotationYValue = document.getElementById("rotationYValue");
      const rotationZValue = document.getElementById("rotationZValue");

      function setStatus(message, type) {
        status.textContent = message;
        status.className = type;
      }

      function showViewer() {
        viewerSection.classList.add("visible");
      }

      function hideViewer() {
        viewerSection.classList.remove("visible");
      }

      async function updateModelWithRotation() {
        if (!baseGeometry) return;

        // Clone the base geometry
        const geometry = baseGeometry.clone();
        
        // Apply rotations
        const euler = new THREE.Euler(
          THREE.MathUtils.degToRad(currentRotation.x),
          THREE.MathUtils.degToRad(currentRotation.y),
          THREE.MathUtils.degToRad(currentRotation.z),
          'XYZ'
        );
        geometry.rotateX(euler.x);
        geometry.rotateY(euler.y);
        geometry.rotateZ(euler.z);
        
        // Recompute normals after rotation
        geometry.computeVertexNormals();

        // Create a mesh with material
        const material = new THREE.MeshStandardMaterial({
          color: 0x606060,
          roughness: 0.7,
          metalness: 0.3,
        });
        const mesh = new THREE.Mesh(geometry, material);
        currentMesh = mesh;

        // Export to GLB
        const exporter = new GLTFExporter();
        
        exporter.parse(
          mesh,
          async (gltf) => {
            const blob = new Blob([gltf], { type: "model/gltf-binary" });
            
            if (currentModelUrl) {
              URL.revokeObjectURL(currentModelUrl);
            }
            
            currentModelUrl = URL.createObjectURL(blob);
            modelViewer.src = currentModelUrl;

            // Generate USDZ for iOS
            try {
              const usdzExporter = new USDZExporter();
              const usdzArrayBuffer = await usdzExporter.parse(mesh);
              const usdzBlob = new Blob([usdzArrayBuffer], { type: "model/vnd.usdz+zip" });
              
              if (currentUSDZUrl) {
                URL.revokeObjectURL(currentUSDZUrl);
              }
              
              currentUSDZUrl = URL.createObjectURL(usdzBlob);
              modelViewer.setAttribute("ios-src", currentUSDZUrl);
            } catch (usdzError) {
              console.warn("USDZ generation failed:", usdzError);
            }
          },
          (error) => {
            console.error("Export error:", error);
          },
          { binary: true }
        );
      }

      fileInput.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;

        setStatus("Loading STL file...", "loading");
        hideViewer();

        try {
          // Read the STL file
          const arrayBuffer = await file.arrayBuffer();

          setStatus("Converting to AR-compatible format...", "loading");

          // Load STL using Three.js
          const loader = new STLLoader();
          const geometry = loader.parse(arrayBuffer);

          // Center and scale the geometry
          geometry.center();
          geometry.computeBoundingBox();
          geometry.computeVertexNormals();

          const size = new THREE.Vector3();
          geometry.boundingBox.getSize(size);
          
          // Convert from millimeters to meters (divide by 1000)
          // STL files are typically in mm, but AR expects meters
          const mmToMeters = 0.001;
          geometry.scale(mmToMeters, mmToMeters, mmToMeters);
          
          // Log the size for debugging
          const sizeInMeters = size.clone().multiplyScalar(mmToMeters);
          console.log('Model size in meters:', sizeInMeters.x.toFixed(3), 'x', sizeInMeters.y.toFixed(3), 'x', sizeInMeters.z.toFixed(3));

          // Store the base geometry for rotation adjustments
          baseGeometry = geometry.clone();
          
          // Reset rotation values
          currentRotation = { x: 0, y: 0, z: 0 };
          rotationX.value = 0;
          rotationY.value = 0;
          rotationZ.value = 0;
          rotationXValue.textContent = "0°";
          rotationYValue.textContent = "0°";
          rotationZValue.textContent = "0°";

          // Create a mesh with a basic material
          const material = new THREE.MeshStandardMaterial({
            color: 0x606060,
            roughness: 0.7,
            metalness: 0.3,
          });
          const mesh = new THREE.Mesh(geometry, material);
          currentMesh = mesh;

          // Export to GLB format
          const exporter = new GLTFExporter();

          exporter.parse(
            mesh,
            async (gltf) => {
              // Convert to Blob
              const blob = new Blob([gltf], { type: "model/gltf-binary" });

              // Revoke previous URL if exists
              if (currentModelUrl) {
                URL.revokeObjectURL(currentModelUrl);
              }

              // Create object URL
              currentModelUrl = URL.createObjectURL(blob);

              // Set the model
              modelViewer.src = currentModelUrl;

              // Also generate USDZ for iOS Quick Look
              try {
                const usdzExporter = new USDZExporter();
                const usdzArrayBuffer = await usdzExporter.parse(mesh);
                const usdzBlob = new Blob([usdzArrayBuffer], { type: "model/vnd.usdz+zip" });
                
                if (currentUSDZUrl) {
                  URL.revokeObjectURL(currentUSDZUrl);
                }
                
                currentUSDZUrl = URL.createObjectURL(usdzBlob);
                modelViewer.setAttribute("ios-src", currentUSDZUrl);
              } catch (usdzError) {
                console.warn("USDZ generation failed:", usdzError);
                // Continue anyway - WebXR might still work
              }

              setStatus(
                "Model loaded successfully! Adjust rotation if needed, then view in AR.",
                "success",
              );
              showViewer();
            },
            (error) => {
              console.error("Export error:", error);
              setStatus("Error converting model: " + error.message, "error");
            },
            { binary: true },
          );
        } catch (error) {
          console.error("Error loading STL:", error);
          setStatus("Error loading STL file: " + error.message, "error");
        }
      });

      arButton.addEventListener("click", async () => {
        if (modelViewer.canActivateAR) {
          modelViewer.activateAR();
        } else {
          setStatus("AR is not available on this device or browser. Make sure you're on an AR-capable device.", "error");
        }
      });

      // Listen for AR status changes
      modelViewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'failed') {
          setStatus("AR failed to launch. This may be because the model is loaded from a local URL. Try using WebXR instead of Quick Look.", "error");
        }
      });

      resetButton.addEventListener("click", () => {
        modelViewer.resetTurntableRotation();
        modelViewer.cameraOrbit =
          modelViewer.getAttribute("camera-orbit") || "0deg 75deg 105%";
        modelViewer.fieldOfView = "45deg";
      });

      uploadNewButton.addEventListener("click", () => {
        fileInput.value = "";
        hideViewer();
        setStatus("", "");
        if (currentModelUrl) {
          URL.revokeObjectURL(currentModelUrl);
          currentModelUrl = null;
        }
        if (currentUSDZUrl) {
          URL.revokeObjectURL(currentUSDZUrl);
          currentUSDZUrl = null;
        }
        baseGeometry = null;
        currentMesh = null;
        currentRotation = { x: 0, y: 0, z: 0 };
      });

      // Rotation slider event listeners
      rotationX.addEventListener("input", (e) => {
        currentRotation.x = parseFloat(e.target.value);
        rotationXValue.textContent = currentRotation.x + "°";
        updateModelWithRotation();
      });

      rotationY.addEventListener("input", (e) => {
        currentRotation.y = parseFloat(e.target.value);
        rotationYValue.textContent = currentRotation.y + "°";
        updateModelWithRotation();
      });

      rotationZ.addEventListener("input", (e) => {
        currentRotation.z = parseFloat(e.target.value);
        rotationZValue.textContent = currentRotation.z + "°";
        updateModelWithRotation();
      });

      // Quick rotation buttons
      document.getElementById("rotate90X").addEventListener("click", () => {
        currentRotation.x = (currentRotation.x + 90) % 360;
        rotationX.value = currentRotation.x;
        rotationXValue.textContent = currentRotation.x + "°";
        updateModelWithRotation();
      });

      document.getElementById("rotateNeg90X").addEventListener("click", () => {
        currentRotation.x = (currentRotation.x - 90) % 360;
        rotationX.value = currentRotation.x;
        rotationXValue.textContent = currentRotation.x + "°";
        updateModelWithRotation();
      });

      document.getElementById("rotate90Y").addEventListener("click", () => {
        currentRotation.y = (currentRotation.y + 90) % 360;
        rotationY.value = currentRotation.y;
        rotationYValue.textContent = currentRotation.y + "°";
        updateModelWithRotation();
      });

      document.getElementById("rotateNeg90Y").addEventListener("click", () => {
        currentRotation.y = (currentRotation.y - 90) % 360;
        rotationY.value = currentRotation.y;
        rotationYValue.textContent = currentRotation.y + "°";
        updateModelWithRotation();
      });

      document.getElementById("rotate90Z").addEventListener("click", () => {
        currentRotation.z = (currentRotation.z + 90) % 360;
        rotationZ.value = currentRotation.z;
        rotationZValue.textContent = currentRotation.z + "°";
        updateModelWithRotation();
      });

      document.getElementById("rotateNeg90Z").addEventListener("click", () => {
        currentRotation.z = (currentRotation.z - 90) % 360;
        rotationZ.value = currentRotation.z;
        rotationZValue.textContent = currentRotation.z + "°";
        updateModelWithRotation();
      });

      // Clean up on page unload
      window.addEventListener("beforeunload", () => {
        if (currentModelUrl) {
          URL.revokeObjectURL(currentModelUrl);
        }
        if (currentUSDZUrl) {
          URL.revokeObjectURL(currentUSDZUrl);
        }
      });
    </script>
  </body>
</html>
